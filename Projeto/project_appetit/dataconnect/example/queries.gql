query ObterUsuarioAtual($id: UUID!) {
  usuario(id: $id) {
    id
    nome
    email
    tipo
    criadoEm
  }
}

query BuscarUsuarioPorEmail($email: String!) {
  usuarios(
    where: {
      email: { eq: $email }
    }
  ) {
    id
    nome
    email
    tipo
    senhaHash
    criadoEm
  }
}

query ObterUsuarioPorId($id: UUID!) {
  usuario(id: $id) {
    id
    nome
    email
    tipo
    criadoEm
  }
}

query ListarMeusPacientes($responsavelId: UUID!) {
  pacientes(
    where: {
      responsavelId: { eq: $responsavelId }
    }
  ) {
    id
    nome
    nascimento
    criadoEm
    responsavel {
      nome
      email
    }
  }
}

query ObterPacienteComRefeicoes($pacienteId: UUID!) {
  paciente(id: $pacienteId) {
    id
    nome
    nascimento
    responsavel {
      nome
      email
    }
    refeicoes: refeicaos_on_paciente {
      id
      dataHora
      status
      urlFotoAntes
      urlFotoDepois
    }
  }
}

query ObterPacienteCompleto($pacienteId: UUID!) {
  paciente(id: $pacienteId) {
    id
    nome
    nascimento
    responsavel {
      nome
      email
    }
    refeicoes: refeicaos_on_paciente {
      id
      dataHora
      status
      urlFotoAntes
      urlFotoDepois
      deteccoes: deteccaoAlimentos_on_refeicao {
        id
        alimento {
          label
          categoria
        }
        percentualConsumido
        aceito
        cor
        textura
      }
      relatorios: relatorios_on_refeicao {
        id
        conteudo
        dataGeracao
      }
    }
  }
}

