query ListarCatalogoAlimentos {
  alimentos(
    orderBy: [{ label: ASC }]
  ) {
    id
    label
    categoria
  }
}

query BuscarAlimentoPorLabel($label: String!) {
  alimentos(
    where: {
      label: { eq: $label }
    }
  ) {
    id
    label
    categoria
  }
}

query ListarAlimentosPorCategoria($categoria: String!) {
  alimentos(
    where: {
      categoria: { eq: $categoria }
    }
    orderBy: [{ label: ASC }]
  ) {
    id
    label
    categoria
  }
}

query ResumoRefeicoes7Dias(
  $pacienteId: UUID!
  $dataLimite: Timestamp!
) {
  refeicaos(
    where: { 
      pacienteId: { eq: $pacienteId }
      dataHora: { ge: $dataLimite }
    }
    orderBy: [{ dataHora: DESC }]
  ) {
    id
    dataHora
    status
    deteccoes: deteccaoAlimentos_on_refeicao {
      alimento {
        categoria
      }
      percentualConsumido
    }
  }
}

query AlimentosMaisDetectados(
  $pacienteId: UUID!
  $dataLimite: Timestamp!
) {
  deteccaoAlimentos(
    where: {
      refeicao: {
        pacienteId: { eq: $pacienteId }
        dataHora: { ge: $dataLimite }
      }
    }
    orderBy: [{ percentualConsumido: DESC }]
  ) {
    alimento {
      label
      categoria
    }
    percentualConsumido
  }
}