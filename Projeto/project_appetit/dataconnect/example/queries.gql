}

# ==========================================
# REFEICAO - Análise de fotos
# ==========================================

# 9. Listar refeições do paciente (com filtro por status)
query ListarRefeicoesPaciente($pacienteId: UUID!, $status: String) {
  refeicoes(
    where: { 
      paciente: { id: { eq: $pacienteId } }
      status: { eq: $status }
    }
    orderBy: { dataHora: "DESC" }
  ) {
    id
    dataHora
    status
    urlFotoAntes
    urlFotoDepois
    paciente {
      nome
    }
  }
}

# 10. Obter refeição específica com detecções
query ObterRefeicaoComDeteccoes($refeicaoId: UUID!) {
  refeicao(id: $refeicaoId) {
    id
    dataHora
    status
    urlFotoAntes
    urlFotoDepois
    paciente {
      nome
    }
    deteccoes(orderBy: { percentualConsumido: "DESC" }) {
      id
      alimento {
        id
        label
        categoria
      }
      percentualConsumido
      aceito
      cor
      textura
      criadoEm
    }
  }
}

# 11. Listar refeições PENDENTES de análise
query ListarRefeicoesPendentes($pacienteId: UUID!) {
  refeicoes(
    where: { 
      paciente: { id: { eq: $pacienteId } }
      status: { eq: "pendente" }
    }
    orderBy: { dataHora: "ASC" }
  ) {
    id
    dataHora
    urlFotoAntes
    paciente {
      nome
    }
  }
}

# ==========================================
# DETECCAO_ALIMENTO - Resultados da IA
# ==========================================

# 12. Listar detecções de uma refeição específica
query ListarDeteccoesPorRefeicao($refeicaoId: UUID!) {
  deteccaoAlimentos(where: { refeicao: { id: { eq: $refeicaoId } } }) {
    id
    alimento {
      label
      categoria
    }
    percentualConsumido
    aceito
    cor
    textura
    criadoEm
  }
}

# 13. Listar detecções ACEITAS de uma refeição
query ListarDeteccoesAceitasPorRefeicao($refeicaoId: UUID!) {
  deteccaoAlimentos(
    where: { 
      refeicao: { id: { eq: $refeicaoId } }
      aceito: { eq: true }
    }
  ) {
    id
    alimento {
      label
      categoria
    }
    percentualConsumido
    cor
    textura
  }
}

# ==========================================
# RELATORIO - Análise completa
# ==========================================

# 14. Obter relatório de uma refeição
query ObterRelatorioPorRefeicao($refeicaoId: UUID!) {
  relatorios(where: { refeicao: { id: { eq: $refeicaoId } } }) {
    id
    conteudo
    dataGeracao
    refeicao {
      dataHora
      urlFotoAntes
    }
  }
}

# 15. Listar relatórios do paciente (últimos 30)
query ListarRelatorioPaciente($pacienteId: UUID!, $limite: Int = 30) {
  relatorios(
    where: { paciente: { id: { eq: $pacienteId } } }
    orderBy: { dataGeracao: "DESC" }
    limit: $limite
  ) {
    id
    conteudo
    dataGeracao
    refeicao {
      id
      dataHora
      urlFotoAntes
    }
  }
}

# 16. Obter relatório completo com contexto (refeição + detecções)
query ObterRelatorioCompleto($relatorioId: UUID!) {
  relatorio(id: $relatorioId) {
    id
    conteudo
    dataGeracao
    refeicao {
      id
      dataHora
      urlFotoAntes
      urlFotoDepois
      status
      paciente {
        nome
      }
      deteccoes {
        id
        alimento {
          label
          categoria
        }
        percentualConsumido
        aceito
        cor
        textura
      }
    }
  }
}

# ==========================================
# ALIMENTO - Catálogo
# ==========================================

# 17. Listar catálogo de alimentos
query ListarCatalogoAlimentos {
  alimentos(orderBy: { label: "ASC" }) {
    id
    label
    categoria
  }
}

# 18. Buscar alimento por label
query BuscarAlimentoPorLabel($label: String!) {
  alimentos(where: { label: { eq: $label } }) {
    id
    label
    categoria
  }
}

# 19. Listar alimentos por categoria
query ListarAlimentosPorCategoria($categoria: String!) {
  alimentos(
    where: { categoria: { eq: $categoria } }
    orderBy: { label: "ASC" }
  ) {
    id
    label
    categoria
  }
}

# ==========================================
# RELATORIOS E ANALYTICS
# ==========================================

# 20. Resumo de refeições do paciente (últimos 7 dias)
query ResumoRefeicoes7Dias($pacienteId: UUID!) {
  refeicoes(
    where: { 
      paciente: { id: { eq: $pacienteId } }
      dataHora: { gte: "now - 7 days" }
    }
    orderBy: { dataHora: "DESC" }
  ) {
    id
    dataHora
    status
    deteccoes {
      alimento {
        categoria
      }
      percentualConsumido
    }
  }
}

# 21. Alimentos mais detectados em período (para recomendações)
query AlimentosMaisDetectados($pacienteId: UUID!, $diasAnteriores: Int = 30) {
  deteccaoAlimentos(
    where: {
      refeicao: {
        paciente: { id: { eq: $pacienteId } }
        dataHora: { gte: "now - {diasAnteriores} days" }
      }
    }
    orderBy: { percentualConsumido: "DESC" }
  ) {
    alimento {
      label
      categoria
    }
    percentualConsumido
  }
}
