query ObterRelatorioPorRefeicao($refeicaoId: UUID!) {
  relatorios(
    where: {
      refeicaoId: { eq: $refeicaoId }
    }
  ) {
    id
    conteudo
    dataGeracao
    refeicao {
      dataHora
      urlFotoAntes
    }
  }
}

query ListarRelatorioPaciente(
  $pacienteId: UUID!
  $limite: Int = 30
) {
  relatorios(
    where: {
      pacienteId: { eq: $pacienteId }
    }
    orderBy: [{ dataGeracao: DESC }]
    limit: $limite
  ) {
    id
    conteudo
    dataGeracao
    refeicao {
      id
      dataHora
      urlFotoAntes
    }
  }
}

query ObterRelatorioCompleto($relatorioId: UUID!) {
