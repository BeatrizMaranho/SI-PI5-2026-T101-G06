# ==========================================
# ALIMENTO - Catálogo
# ==========================================

# 17. Listar catálogo de alimentos
query ListarCatalogoAlimentos {
  alimentos(
    orderBy: [{ label: ASC }]
  ) {
    id
    label
    categoria
  }
}

# 18. Buscar alimento por label
query BuscarAlimentoPorLabel($label: String!) {
  alimentos(
    where: {
      label: { eq: $label }
    }
  ) {
    id
    label
    categoria
  }
}

# 19. Listar alimentos por categoria
query ListarAlimentosPorCategoria($categoria: String!) {
  alimentos(
    where: {
      categoria: { eq: $categoria }
    }
    orderBy: [{ label: ASC }]
  ) {
    id
    label
    categoria
  }
}

# ==========================================
# RELATORIOS E ANALYTICS
# ==========================================

# 20. Resumo de refeições do paciente (últimos 7 dias)
query ResumoRefeicoes7Dias(
  $pacienteId: UUID!
  $dataLimite: Timestamp!
) {
  refeicaos(
    where: { 
      pacienteId: { eq: $pacienteId }
      dataHora: { ge: $dataLimite }
    }
    orderBy: [{ dataHora: DESC }]
  ) {
    id
    dataHora
    status
    deteccoes: deteccaoAlimentos_on_refeicao {
      alimento {
        categoria
      }
      percentualConsumido
    }
  }
}

# 21. Alimentos mais detectados em período (para recomendações)
query AlimentosMaisDetectados(
  $pacienteId: UUID!
  $dataLimite: Timestamp!
) {
  deteccaoAlimentos(
    where: {
      refeicao: {
        pacienteId: { eq: $pacienteId }
        dataHora: { ge: $dataLimite }
      }
    }
    orderBy: [{ percentualConsumido: DESC }]
  ) {
    alimento {
      label
      categoria
    }
    percentualConsumido
  }
}