# ==========================================
# REFEICAO - Análise de fotos
# ==========================================

# 9. Listar refeições do paciente (com filtro por status)
query ListarRefeicoesPaciente(
  $pacienteId: UUID!
  $status: String
) {
  refeicaos(
    where: { 
      pacienteId: { eq: $pacienteId }
      status: { eq: $status }
    }
    orderBy: [{ dataHora: DESC }]
  ) {
    id
    dataHora
    status
    urlFotoAntes
    urlFotoDepois
    paciente {
      nome
    }
  }
}

# 10. Obter refeição específica com detecções
query ObterRefeicaoComDeteccoes($refeicaoId: UUID!) {
  refeicao(id: $refeicaoId) {
    id
    dataHora
    status
    urlFotoAntes
    urlFotoDepois
    paciente {
      nome
    }
    deteccoes: deteccaoAlimentos_on_refeicao {
      id
      alimento {
        id
        label
        categoria
      }
      percentualConsumido
      aceito
      cor
      textura
      criadoEm
    }
  }
}

# 11. Listar refeições PENDENTES de análise
query ListarRefeicoesPendentes($pacienteId: UUID!) {
  refeicaos(
    where: { 
      pacienteId: { eq: $pacienteId }
      status: { eq: "pendente" }
    }
    orderBy: [{ dataHora: ASC }]
  ) {
    id
    dataHora
    urlFotoAntes
    paciente {
      nome
    }
  }
}

