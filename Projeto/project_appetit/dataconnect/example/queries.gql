# ============================================
# APPETIT - QUERIES GRAPHQL
# Filtradas por tipo de usuario
# ============================================

# ==========================================
# USUARIO - Autenticação e Perfil
# ==========================================

# 1. Obter dados do usuario autenticado
query ObterUsuarioAtual($id: UUID!) {
  usuario(id: $id) {
    id
    nome
    email
    tipo
    criadoEm
  }
}

# 2. Buscar usuario por email (para login)
query BuscarUsuarioPorEmail($email: String!) {
  usuarios(
    where: {
      email: { eq: $email }
    }
  ) {
    id
    nome
    email
    tipo
    senhaHash
    criadoEm
  }
}

# 3. Buscar usuario por ID
query ObterUsuarioPorId($id: UUID!) {
  usuario(id: $id) {
    id
    nome
    email
    tipo
    criadoEm
  }
}

# 4. Listar meus pacientes
query ListarMeusPacientes($responsavelId: UUID!) {
  pacientes(
    where: {
      responsavelId: { eq: $responsavelId }
    }
  ) {
    id
    nome
    nascimento
    criadoEm
    criadoEm
    responsavel {
      nome
      email
    }
  }
}

# 5. Obter paciente específico com todas as refeições
query ObterPacienteComRefeicoes($pacienteId: UUID!) {
  paciente(id: $pacienteId) {
    id
    nome
    nascimento
    responsavel {
      nome
      email
    }
    refeicoes: refeicaos_on_paciente {
      id
      dataHora
      status
      urlFotoAntes
      urlFotoDepois
    }
  }
}

# 6. Obter paciente com histórico completo (refeições + relatórios)
query ObterPacienteCompleto($pacienteId: UUID!) {
  paciente(id: $pacienteId) {
    id
    nome
    nascimento
    responsavel {
      nome
      email
    }
    refeicoes: refeicaos_on_paciente {
      id
      dataHora
      status
      urlFotoAntes
      urlFotoDepois
      deteccoes: deteccaoAlimentos_on_refeicao {
        id
        alimento {
          label
          categoria
        }
        percentualConsumido
        aceito
        cor
        textura
      }
      relatorios: relatorios_on_refeicao {
        id
        conteudo
        dataGeracao
      }
    }
  }
}

