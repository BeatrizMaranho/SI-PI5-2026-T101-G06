# ============================================
# APPETIT - QUERIES GRAPHQL
# Filtradas por tipo de usuario
# ============================================

# ==========================================
# USUARIO - Autenticação e Perfil
# ==========================================

# 1. Obter dados do usuario autenticado
query ObterUsuarioAtual {
  usuario_atual {
    id
    nome
    email
    tipo
    criadoEm
  }
}

# 2. Buscar usuario por email (para login)
query BuscarUsuarioPorEmail($email: String!) {
  usuarios(where: { email: { eq: $email } }) {
    id
    nome
    email
    tipo
    senhaHash
    criadoEm
  }
}

# 3. Buscar usuario por ID
query ObterUsuarioPorId($id: UUID!) {
  usuario(id: $id) {
    id
    nome
    email
    tipo
    criadoEm
  }
}

query ListarMeusPacientes {
  pacientes(where: { responsavel: { id: { eq: "auth.uid" } } }) {
    id
    nome
    nascimento
    criadoEm
    responsavel {
      nome
      email
    }
  }
}

# 5. Obter paciente específico com todas as refeições
query ObterPacienteComRefeicoes($pacienteId: UUID!) {
  paciente(id: $pacienteId) {
    id
    nome
    nascimento
    responsavel {
      nome
      email
    }
    refeicoes(orderBy: { dataHora: "DESC" }) {
      id
      dataHora
      status
      urlFotoAntes
      urlFotoDepois
    }
  }
}

# 6. Obter paciente com histórico completo (refeições + relatórios)
query ObterPacienteCompleto($pacienteId: UUID!) {
  paciente(id: $pacienteId) {
    id
    nome
    nascimento
    responsavel {
      nome
      email
    }
    refeicoes(orderBy: { dataHora: "DESC" }) {
      id
      dataHora
      status
      urlFotoAntes
      urlFotoDepois
      deteccoes {
        id
        alimento {
          label
          categoria
        }
        percentualConsumido
        aceito
        cor
        textura
      }
      relatorio {
        id
        conteudo
        dataGeracao
      }
    }
  }
}

