# 15. Listar relatórios do paciente (últimos 30)
query ListarRelatorioPaciente(
  $pacienteId: UUID!
  $limite: Int = 30
) {
  relatorios(
    where: {
      pacienteId: { eq: $pacienteId }
    }
    orderBy: [{ dataGeracao: DESC }]
    limit: $limite
  ) {
    id
    conteudo
    dataGeracao
    refeicao {
      id
      dataHora
      urlFotoAntes
      urlFotoAntes
    }
  }
}

