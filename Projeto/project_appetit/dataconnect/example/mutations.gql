# 12. Criar detecção (Chamado após Python processar a foto)
mutation CriarDeteccao(
  $refeicao_id: UUID!
  $alimento_id: UUID!
  $percentualConsumido: Float!
  $cor: String
  $textura: String
) {
  insert_deteccaoAlimento(
    data: {
      refeicao: { id: $refeicao_id }
      alimento: { id: $alimento_id }
      percentualConsumido: $percentualConsumido
      cor: $cor
      textura: $textura
      aceito: false  # Usuario confirma depois
    }
  ) {
    id
    alimento {
      id
      label
      categoria
    }
    percentualConsumido
    aceito
    cor
    textura
  }
}

# 13. Criar múltiplas detecções (batch - mais eficiente)
# Dart chama isso UMA VEZ com todos os alimentos detectados
mutation CriarDeteccoes(
  $refeicao_id: UUID!
  $deteccoes: [DeteccaoAlimentoInput!]!
) {
  insert_deteccaoAlimentos(
    data: {
      refeicao_id: $refeicao_id
      items: $deteccoes
    }
  ) {
    ids
    count
  }
}

# 14. Atualizar detecção (usuario aceita/rejeita resultado)
mutation AtualizarDeteccao(
  $id: UUID!
  $aceito: Boolean!
) {
  update_deteccaoAlimento(
    id: $id
    data: {
      aceito: $aceito
    }
  ) {
    id
    alimento {
      label
    }
    percentualConsumido
    aceito
  }
}

# 15. Deletar detecção (se usuario rejeitar)
mutation DeletarDeteccao($id: UUID!) {
  delete_deteccaoAlimento(id: $id) {
    id
  }
}

