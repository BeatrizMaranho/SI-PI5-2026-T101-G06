# 23. Vincular nutricionista e criar primeiros dados
mutation VincularNutricionistaComPaciente(
  $nutricionista_id: UUID!
  $paciente_id: UUID!
) {
  insert_nutricionistaPaciente(
    data: {
      nutricionista: { id: $nutricionista_id }
      paciente: { id: $paciente_id }
    }
  ) {
    nutricionista {
      id
      nome
      email
    }
    paciente {
      id
      nome
      refeicoes {
        id
        dataHora
        status
      }
      relatorios {
        id
        dataGeracao
      }
    }
    vinculadoEm
  }
}

