mutation CriarUsuario(
  $id: String!
  $nome: String!
  $email: String!
  $senhaHash: String!
  $tipo: String!
) @auth(level: PUBLIC) {
  usuario_insert(
    data: {
      id: $id
      nome: $nome
      email: $email
      senhaHash: $senhaHash
      tipo: $tipo
    }
  )
}

mutation DeletarUsuario($id: String!) @auth(level: USER) {
  usuario_delete(key: { id: $id })
}

mutation AtualizarPerfil(
  $id: String!
  $nome: String
  $email: String
) @auth(level: USER) {
  usuario_update(
    id: $id
    data: {
      nome: $nome
      email: $email
    }
  )
}

mutation AtualizarSenha(
  $id: String!
  $senhaHashNova: String!
) @auth(level: USER) {
  usuario_update(
    id: $id
    data: {
      senhaHash: $senhaHashNova
    }
  )
}

mutation CriarPaciente(
  $nome: String!
  $responsavelId: String!
  $nascimento: Date
  $peso: Float
  $alergias: String
) @auth(level: USER) {
  paciente_insert(
    data: {
      nome: $nome
      responsavelId: $responsavelId
      nascimento: $nascimento
      peso: $peso
      alergias: $alergias
    }
  )
}

mutation AtualizarPaciente(
  $id: UUID!
  $nome: String
  $nascimento: Date
) @auth(level: USER) {
  paciente_update(
    id: $id
    data: {
      nome: $nome
      nascimento: $nascimento
    }
  )
}

mutation DeletarPaciente(
  $id: UUID!
) @auth(level: USER) {
  paciente_delete(key: { id: $id })
}

mutation VincularNutricionista(
