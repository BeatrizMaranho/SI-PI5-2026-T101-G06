# 19. Criar relatório (Dart monta e salva após receber dados do Python)
# conteudo é um STRING com JSON:
# {
#   "resumo": "...",
#   "alimentos": [...],
#   "recomendacoes": "..."
# }
mutation CriarRelatorio(
  $refeicao_id: UUID!
  $paciente_id: UUID!
  $conteudo: String!
) {
  insert_relatorio(
    data: {
      refeicao: { id: $refeicao_id }
      paciente: { id: $paciente_id }
      conteudo: $conteudo
    }
  ) {
    id
    refeicao {
      id
      dataHora
    }
    paciente {
      nome
    }
    conteudo
    dataGeracao
  }
}

# 20. Atualizar relatório (se precisar corrigir algo)
mutation AtualizarRelatorio(
