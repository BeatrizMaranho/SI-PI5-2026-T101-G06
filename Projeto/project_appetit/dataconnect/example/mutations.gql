mutation CriarDeteccao(
  $refeicaoId: UUID!
  $alimentoId: UUID!
  $confidence: Float!
  $percentualConsumido: Float!
  $cor: String
  $textura: String
) @auth(level: USER) {
  deteccaoAlimento_insert(
    data: {
      refeicaoId: $refeicaoId
      alimentoId: $alimentoId
      confidence: $confidence
      percentualConsumido: $percentualConsumido
      cor: $cor
      textura: $textura
      aceito: false
    }
  )
}

mutation AtualizarDeteccao(
  $id: UUID!
  $aceito: Boolean!
) @auth(level: USER) {
  deteccaoAlimento_update(
    id: $id
    data: {
      aceito: $aceito
    }
  )
}

mutation DeletarDeteccao(
  $id: UUID!
) @auth(level: USER) {
  deteccaoAlimento_delete(key: { id: $id })
}

