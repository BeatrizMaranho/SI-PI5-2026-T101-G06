    nascimento
  }
}

# 6. Deletar paciente
mutation DeletarPaciente($id: UUID!) {
  delete_paciente(id: $id) {
    id
    nome
  }
}

# 7. Criar vínculo entre nutricionista e paciente
mutation VincularNutricionista(
  $nutricionista_id: UUID!
  $paciente_id: UUID!
) {
  insert_nutricionistaPaciente(
    data: {
      nutricionista: { id: $nutricionista_id }
      paciente: { id: $paciente_id }
    }
  ) {
    nutricionista {
      id
      nome
      email
    }
    paciente {
      id
      nome
    }
    vinculadoEm
  }
}

# 8. Remover vínculo entre nutricionista e paciente
mutation DesvincularNutricionista(
  $nutricionista_id: UUID!
  $paciente_id: UUID!
) {
  delete_nutricionistaPaciente(
    id: { nutricionista_id: $nutricionista_id, paciente_id: $paciente_id }
  ) {
    nutricionista {
      nome
    }
    paciente {
      nome
    }
  }
}

# 9. Criar nova refeição (usuario tira foto)
mutation CriarRefeicao(
  $paciente_id: UUID!
  $urlFotoAntes: String!
  $status: String = "pendente"
) {
  insert_refeicao(
    data: {
      paciente: { id: $paciente_id }
      urlFotoAntes: $urlFotoAntes
      status: $status
    }
  ) {
    id
    dataHora
    status
    urlFotoAntes
    paciente {
      id
      nome
    }
  }
}

