# 1. REGISTRO
mutation CriarUsuario(
  $nome: String!
  $email: String!
  $senhaHash: String!
  $tipo: String!  # "usuario" ou "nutricionista"
) {
  insert_usuario(
    data: {
      nome: $nome
      email: $email
      senhaHash: $senhaHash
      tipo: $tipo
    }
  ) {
    id
    nome
    email
    tipo
    criadoEm
  }
}

# 2. Atualizar perfil do usuario
mutation AtualizarPerfil(
  $id: UUID!
  $nome: String
  $email: String
) {
  update_usuario(
    id: $id
    data: {
      nome: $nome
      email: $email
    }
  ) {
    id
    nome
    email
    criadoEm
  }
}

# 3. Atualizar senha do usuario
mutation AtualizarSenha(
  $id: UUID!
  $senhaHashNova: String!
) {
  update_usuario(
    id: $id
    data: {
      senhaHash: $senhaHashNova
    }
  ) {
    id
    nome
  }
}

# 4. Criar novo paciente
mutation CriarPaciente(
  $nome: String!
  $responsavel_id: UUID!
  $nascimento: Date
) {
  insert_paciente(
    data: {
      nome: $nome
      responsavel: { id: $responsavel_id }
      nascimento: $nascimento
    }
  ) {
    id
    nome
    nascimento
    criadoEm
    responsavel {
      id
      nome
      email
    }
  }
}

# 5. Atualizar dados do paciente
mutation AtualizarPaciente(
  $id: UUID!
  $nome: String
  $nascimento: Date
) {
  update_paciente(
    id: $id
    data: {
      nome: $nome
      nascimento: $nascimento
    }
  ) {
    id
