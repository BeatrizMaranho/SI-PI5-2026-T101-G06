# 1. REGISTRO
mutation CriarUsuario(
  $nome: String!
  $email: String!
  $senhaHash: String!
  $tipo: String!  # "usuario" ou "nutricionista"
) {
  usuario_insert(
    data: {
      nome: $nome
      email: $email
      senhaHash: $senhaHash
      tipo: $tipo
    }
  )
}

# 2. Atualizar perfil do usuario
mutation AtualizarPerfil(
  $id: UUID!
  $nome: String
  $email: String
) {
  usuario_update(
    id: $id
    data: {
      nome: $nome
      email: $email
    }
  )
}

# 3. Atualizar senha do usuario
mutation AtualizarSenha(
  $id: UUID!
  $senhaHashNova: String!
) {
  usuario_update(
    id: $id
    data: {
      senhaHash: $senhaHashNova
    }
  )
}

# 4. Criar novo paciente
mutation CriarPaciente(
  $nome: String!
  $responsavelId: UUID!
  $nascimento: Date
) {
  paciente_insert(
    data: {
      nome: $nome
      responsavelId: $responsavelId
      nascimento: $nascimento
    }
  )
}

# 5. Atualizar dados do paciente
mutation AtualizarPaciente(
  $id: UUID!
  $nome: String
  $nascimento: Date
) {
  paciente_update(
    id: $id
    data: {
      nome: $nome
      nascimento: $nascimento
    }
  )
}

# 6. Deletar paciente
mutation DeletarPaciente($id: UUID!) {
  paciente_delete(id: $id)
}

# 7. Criar vínculo entre nutricionista e paciente
mutation VincularNutricionista(
  $nutricionistaId: UUID!
  $pacienteId: UUID!
) {
  nutricionistaPaciente_insert(
    data: {
      nutricionistaId: $nutricionistaId
      pacienteId: $pacienteId
    }
  )
}

# 8. Remover vínculo entre nutricionista e paciente
mutation DesvincularNutricionista(
  $nutricionistaId: UUID!
  $pacienteId: UUID!
) {
  nutricionistaPaciente_delete(
    key: { 
      nutricionistaId: $nutricionistaId, 
      pacienteId: $pacienteId 
    }
  )
}

# 9. Criar nova refeição (usuario tira foto)
mutation CriarRefeicao(
  $pacienteId: UUID!
  $urlFotoAntes: String!
  $status: String = "pendente"
) {
  refeicao_insert(
    data: {
      pacienteId: $pacienteId
      urlFotoAntes: $urlFotoAntes
      status: $status
    }
  )
}

# 10. Atualizar refeição
mutation AtualizarRefeicao(
  $id: UUID!
  $urlFotoDepois: String
  $status: String
) {
  refeicao_update(
    id: $id
    data: {
      urlFotoDepois: $urlFotoDepois
      status: $status
    }
  )
}

# 11. Deletar refeição
mutation DeletarRefeicao($id: UUID!) {
  refeicao_delete(id: $id)
}

# 12. Criar detecção (Chamado após Python processar a foto)
mutation CriarDeteccao(
  $refeicaoId: UUID!
  $alimentoId: UUID!
  $confidence: Float!
  $percentualConsumido: Float!
  $cor: String
  $textura: String
) {
  deteccaoAlimento_insert(
    data: {
      refeicaoId: $refeicaoId
      alimentoId: $alimentoId
      confidence: $confidence
      percentualConsumido: $percentualConsumido
      cor: $cor
      textura: $textura
      aceito: false  # Usuario confirma depois
    }
  )
}

# 13. Criar múltiplas detecções (batch - mais eficiente)
# NOTA: Removido pois o Data Connect não suporta lista dinâmica no insertMany.
# O Dart deve fazer um loop e chamar a mutation "CriarDeteccao" individualmente.

# 14. Atualizar detecção (usuario aceita/rejeita resultado)
mutation AtualizarDeteccao(
  $id: UUID!
  $aceito: Boolean!
) {
  deteccaoAlimento_update(
    id: $id
    data: {
      aceito: $aceito
    }
  )
}

# 15. Deletar detecção (se usuario rejeitar)
mutation DeletarDeteccao($id: UUID!) {
  deteccaoAlimento_delete(id: $id)
}

# 16. Criar novo alimento
mutation CriarAlimento(
  $label: String!
