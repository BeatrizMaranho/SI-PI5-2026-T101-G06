# 19. Criar relatório (Dart monta e salva após receber dados do Python)
# conteudo é um STRING com JSON:
# {
#   "resumo": "...",
#   "alimentos": [...],
#   "recomendacoes": "..."
# }
mutation CriarRelatorio(
  $refeicaoId: UUID!
  $pacienteId: UUID!
  $conteudo: String!
) {
  relatorio_insert(
    data: {
      refeicaoId: $refeicaoId
      pacienteId: $pacienteId
      conteudo: $conteudo
    }
  )
}

# 20. Atualizar relatório (se precisar corrigir algo)
mutation AtualizarRelatorio(
  $id: UUID!
  $conteudo: String!
) {
  relatorio_update(
    id: $id
    data: {
      conteudo: $conteudo
    }
  )
}

# 21. Deletar relatório
mutation DeletarRelatorio($id: UUID!) {
  relatorio_delete(id: $id)
}

# 23. Vincular nutricionista e criar primeiros dados
mutation VincularNutricionistaComPaciente(
  $nutricionistaId: UUID!
  $pacienteId: UUID!
) {
  nutricionistaPaciente_insert(
    data: {
      nutricionistaId: $nutricionistaId
      pacienteId: $pacienteId
    }
  )
}

# 24. Marcar refeição como "analisada" após criar relatório
mutation MarcarRefeicaoAnalisada($id: UUID!) {
  refeicao_update(
    id: $id
    data: {
      status: "analisada"
    }
  )
}

# 25. Rejeitar refeição 
mutation RejeitarRefeicao(
  $id: UUID!
  $motivo: String
) {
  refeicao_update(
    id: $id
    data: {
      status: "rejeitada"
    }
  )
}