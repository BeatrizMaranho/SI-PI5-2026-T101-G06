# 1. USUARIO
# 1. USUARIO
type Usuario @table {
  id: UUID! @default(expr: "uuidV4()")
  nome: String!
  email: String! @unique
  senhaHash: String!
  tipo: String!
  criadoEm: Timestamp! @default(expr: "request.time")
}

# 2. PACIENTE
# 2. PACIENTE
type Paciente @table {
  id: UUID! @default(expr: "uuidV4()")
  nome: String!
  responsavelId: UUID!
  responsavel: Usuario!
  nascimento: Date
  criadoEm: Timestamp! @default(expr: "request.time")
  criadoEm: Timestamp! @default(expr: "request.time")
}

# 3. NUTRICIONISTA_PACIENTE
type NutricionistaPaciente @table(key: ["nutricionistaId", "pacienteId"]) {
  nutricionistaId: UUID!
  pacienteId: UUID!
  nutricionista: Usuario!
  paciente: Paciente!
  vinculadoEm: Timestamp! @default(expr: "request.time")
  vinculadoEm: Timestamp! @default(expr: "request.time")
}

# 4. REFEICAO
# 4. REFEICAO
type Refeicao @table {
  id: UUID! @default(expr: "uuidV4()")
  pacienteId: UUID!
  paciente: Paciente!
  dataHora: Timestamp! @default(expr: "request.time")
  status: String!
  status: String!
  urlFotoAntes: String!
  urlFotoDepois: String
}

# 5. ALIMENTO
# 5. ALIMENTO
type Alimento @table {
  id: UUID! @default(expr: "uuidV4()")
  label: String! @unique
  label: String! @unique
  categoria: String
}

# 6. DETECCAO_ALIMENTO
# 6. DETECCAO_ALIMENTO
type DeteccaoAlimento @table {
  id: UUID! @default(expr: "uuidV4()")
  refeicaoId: UUID!
  refeicao: Refeicao!
  alimentoId: UUID!
  alimento: Alimento!
  confidence: Float!
  confidence: Float!
  percentualConsumido: Float!
  aceito: Boolean! @default(value: false)
  aceito: Boolean! @default(value: false)
  cor: String
  textura: String
  criadoEm: Timestamp! @default(expr: "request.time")
}

# 7. RELATORIO
type Relatorio @table {
  id: UUID! @default(expr: "uuidV4()")
  refeicaoId: UUID!
  refeicao: Refeicao!
  pacienteId: UUID!
  paciente: Paciente!
  dataGeracao: Timestamp! @default(expr: "request.time")
  conteudo: String!
}